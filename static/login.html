<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 攻防戰 - 系統登入</title>
    <style>
        :root {
            --bg: #f8fafc; 
            --panel: #ffffff; 
            --primary: #3b82f6; 
            --text: #1e293b;
            --input-bg: #ffffff;
            --input-border: #cbd5e1;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a; 
                --panel: #1e293b; 
                --text: #f8fafc;
                --input-bg: #0f172a;
                --input-border: #334155;
            }
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: var(--panel); padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h1 { margin-top: 0; color: var(--text); font-size: 1.8rem; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; background: var(--input-bg); color: var(--text); border: 1px solid var(--input-border); border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        #error-msg { color: #ef4444; margin-bottom: 15px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>🔐 攻防戰系統登入</h1>
        <div id="error-msg"></div>
        <input type="text" id="username" placeholder="請輸入帳號 (red/blue)">
        <input type="password" id="password" placeholder="請輸入密碼">
        <button onclick="doLogin()">登入系統</button>
    </div>

    <script>
        async function doLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');
            
            // 自動偵測 Base Path
            const pathname = window.location.pathname;
            const basePath = pathname.includes('/login') ? pathname.replace('/login', '') : pathname.replace(/\/$/, '');
            
            try {
                const res = await fetch(`${basePath}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    window.location.href = data.redirect_url; // 登入成功，導向專屬頁面
                } else {
                    errorEl.innerText = data.msg;
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.innerText = "連線失敗，請確認伺服器狀態。";
                errorEl.style.display = 'block';
            }
        }
    </script>
</body>
</html>
