<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 攻防戰 - 關主後台</title>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --panel-bg: #ffffff;
            --text-main: #1e293b;
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #22c55e;
            --border: #e2e8f0;
            --radius: 8px;
            --status-bg: #e0f2fe; 
            --log-bg: #f8fafc;
            --input-bg: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --panel-bg: #1e293b;
                --text-main: #f8fafc;
                --border: #334155;
                --status-bg: #1e3a8a;
                --log-bg: #020617;
                --input-bg: #0f172a;
            }
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-color); color: var(--text-main); padding: 20px; max-width: 900px; margin: 0 auto; transition: background-color 0.3s, color 0.3s; }
        .panel { background: var(--panel-bg); padding: 20px; border-radius: var(--radius); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; border: 1px solid var(--border); }
        h1, h2, h3 { margin-top: 0; }

        .status-bar { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: bold; padding: 15px; background: var(--status-bg); border-radius: var(--radius); margin-bottom: 20px; }
        .scores { display: flex; gap: 20px; font-size: 1.5rem; }
        .red-score { color: var(--danger); }
        .blue-score { color: var(--primary); }
        
        button { padding: 10px 15px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 1rem; font-weight: bold; transition: opacity 0.2s; margin: 5px; }
        button:hover { opacity: 0.8; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        
        .control-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }

        input[type="text"], textarea { width: 100%; padding: 10px; background: var(--input-bg); color: var(--text-main); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; box-sizing: border-box; font-family: monospace; }
        
        #connection-status { text-align: center; padding: 10px; font-weight: bold; color: white; background: var(--danger); border-radius: var(--radius); margin-bottom: 20px; display: none; }
        .connected { background: var(--success) !important; }
    </style>
</head>
<body>

    <div id="connection-status">連線中...</div>

    <div class="status-bar">
        <div id="phase-display">階段：載入中...</div>
        <div id="timer-display">⏱️ 00:00</div>
        <div style="margin-top: 10px;">
            <button onclick="adjustTime(1)" style="background: #10b981; padding: 5px 10px; font-size: 0.9rem;">⏳ +1 分鐘</button>
            <button onclick="adjustTime(-1)" style="background: #ef4444; padding: 5px 10px; font-size: 0.9rem;">⏳ -1 分鐘</button>
        </div>
        <div class="scores">
            <span class="red-score">🔴 <span id="score-red">0</span></span>
            <span class="blue-score">🔵 <span id="score-blue">0</span></span>
        </div>
        <button class="btn-danger" onclick="doLogout()">🚪 登出系統</button>
    </div>

    <div class="panel">
        <h2>🎬 賽程控制</h2>
        <div class="control-grid">
            <button class="btn-primary" onclick="setPhase('WAIT_R1', 0)">1️⃣ 第一輪準備畫面</button>
            <div style="display: flex; flex-direction: column; gap: 8px; background: var(--bg-color); padding: 10px; border-radius: var(--radius); border: 1px solid var(--border); box-sizing: border-box; justify-content: center;">
                <div style="display: flex; align-items: center; justify-content: center; gap: 5px;">
                    <span style="font-size: 0.9rem; font-weight: bold; white-space: nowrap;">⏳ 回合時間:</span>
                    <input type="number" id="time-r1" value="7" min="1" max="60" style="width: 55px; margin-bottom: 0; padding: 5px; text-align: center;">
                    <span style="font-size: 0.9rem; font-weight: bold; white-space: nowrap;">分鐘</span>
                </div>
                <button class="btn-success" style="margin: 0; width: 100%; padding: 8px 0;" onclick="setPhase('R1_RUNNING', document.getElementById('time-r1').value)">2️⃣ 開始第一輪</button>
            </div>
            <button class="btn-danger" onclick="setPhase('R1_EVAL', 0)">⏹️ 提前鎖定 R1 並開獎</button>
            
            <button class="btn-primary" onclick="setPhase('WAIT_R2', 0)">3️⃣ 第二輪準備畫面</button>
            <div style="display: flex; flex-direction: column; gap: 8px; background: var(--bg-color); padding: 10px; border-radius: var(--radius); border: 1px solid var(--border); box-sizing: border-box; justify-content: center;">
                <div style="display: flex; align-items: center; justify-content: center; gap: 5px;">
                    <span style="font-size: 0.9rem; font-weight: bold; white-space: nowrap;">⏳ 回合時間:</span>
                    <input type="number" id="time-r2" value="10" min="1" max="60" style="width: 55px; margin-bottom: 0; padding: 5px; text-align: center;">
                    <span style="font-size: 0.9rem; font-weight: bold; white-space: nowrap;">分鐘</span>
                </div>
                <button class="btn-success" style="margin: 0; width: 100%; padding: 8px 0;" onclick="setPhase('R2_RUNNING', document.getElementById('time-r2').value)">4️⃣ 開始第二輪</button>
            </div>
            <button class="btn-danger" onclick="setPhase('END', 0)">⏹️ 提前鎖定 R2</button>
            
            <button class="btn-success" onclick="setPhase('FINAL', 0)" style="grid-column: span 2;">🏆 5️⃣ 結算最終勝負</button>
            <button class="btn-danger" onclick="resetGame()">⚠️ 重置遊戲</button>

            <button class="btn-primary" style="background: #8b5cf6;" onclick="window.open('scoreboard', '_blank')">📺 另開大螢幕記分板</button>
        
            <button class="btn-primary" style="background: #10b981; grid-column: span 3;" onclick="window.open(`${basePath}/api/download_log`, '_blank')">📥 一鍵下載完整賽局戰報 (JSON)</button>
        </div>
    </div>

    <div class="panel">
        <h2>⚙️ 遊戲設定 (即時同步至前端)</h2>
        <label>Base System Message:</label>
        <textarea id="in-sysmsg" rows="3"></textarea>
        
        <label>目標關鍵字 (以半形逗號分隔):</label>
        <textarea id="in-keywords" rows="2"></textarea>
        
        <div style="display: flex; gap: 20px; margin-bottom: 15px;">
            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="checkbox" id="in-antispam" style="width: auto;"> 🚫 防洗版 (禁止重複發送)
            </label>
            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="checkbox" id="in-advscore" style="width: auto;"> 🎯 精準爆擊 (恰好等於給2分)
            </label>
        </div>

        <label>選擇語言模型 (Model 特性與難度):</label>
        <select id="in-model" style="width: 100%; padding: 10px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 15px; font-size: 1rem;">
            <optgroup label="🟢【Level 1】經典輕量區 (極易攻破 / 建立成就感)">
                <option value="qwen/qwen-2.5-7b-instruct">Qwen 2.5 7B 【中文佳】(常被情境設定騙走)</option>
                <option value="meta-llama/llama-3.1-8b-instruct">Llama 3.1 8B 【英文佳】(開源輕量經典，中文稍弱)</option>
                <option value="google/gemma-2-9b-it">Gemma 2 9B 【雙語可】(Google 開源小模型，腦波弱)</option>
            </optgroup>

            <optgroup label="⚡【Level 2】次世代極速區 (2026 新架構 / 快節奏競技)">
                <option value="anthropic/claude-4.5-haiku">Claude Haiku 4.5 【次世代｜速度之王】(極速秒回，防護力適中)</option>
                <option value="google/gemini-3.5-flash">Gemini 3.5 Flash 【次世代｜即時反應】(速度極快，帶有基礎安全審查)</option>
                <option value="openai/gpt-4o-mini">GPT-4o-mini 【經典款｜雙語優】(高CP值標準局，反應快)</option>
            </optgroup>
            
            <optgroup label="🔵【Level 3】中階智囊區 (攻防均衡 / 邏輯強化)">
                <option value="meta-llama/llama-4-8b">Llama 4 (Scout) 【次世代｜MoE 架構】(最新開源，看重防禦邏輯)</option>
                <option value="deepseek/deepseek-chat">DeepSeek V3 【經典款｜程式邏輯強】(極度聰明，但有時過於貼心)</option>
                <option value="qwen/qwen-2.5-72b-instruct">Qwen 2.5 72B 【經典款｜防守中上】(中國開源大模型，邏輯更強)</option>
            </optgroup>
            
            <optgroup label="🔴【Level 4】重裝魔王區 (2024-25 旗艦 / 銅牆鐵壁)">
                <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet 【防守天花板】(前代 Prompt Injection 防禦霸主)</option>
                <option value="openai/gpt-4o">GPT-4o 【旗艦邏輯】(極難用簡單話術繞過)</option>
                <option value="google/gemini-1.5-pro">Gemini 1.5 Pro 【極度龜毛】(動不動就觸發安全機制拒答)</option>
                <option value="meta-llama/llama-3.3-70b-instruct">Llama 3.3 70B 【開源守護神】(大參數帶來的硬核防禦力)</option>
            </optgroup>

            <optgroup label="👑【Level 5】次世代神級區 (2026 旗艦 / 令人絕望的防禦)">
                <option value="anthropic/claude-4.5-opus">Claude Opus 4.5 【次世代｜防守巔峰】(邏輯滴水不漏，極難被欺騙)</option>
                <option value="openai/gpt-5.5-pro">GPT-5.5 Pro 【次世代｜超強理解】(超長上下文，絕對不會忘記防禦規則)</option>
                <option value="google/gemini-3.1-pro">Gemini 3.1 Pro 【次世代｜進階推理】(深度問題解決，極難找出破綻)</option>
            </optgroup>

            <optgroup label="👽【Special】奇招與無護欄區 (特色玩法)">
                <option value="x-ai/grok-2-1212">Grok 2 【馬斯克出品｜叛逆不羈】(護欄極少，完全考驗玩家寫的防禦指令)</option>
                <option value="mistralai/mistral-large-2411">Mistral Large 2411 【歐洲旗艦｜彈性極佳】(對超長篇「故事劇本」攻擊有奇效)</option>
                <option value="cohere/command-r-plus">Command R+ 【企業專用｜實事求是】(講話一板一眼，不容易被情緒勒索)</option>
            </optgroup>
        </select>
        
        <button class="btn-primary" onclick="saveSettings()">💾 儲存設定</button>
    </div>

    <div class="panel">
        <h3>📜 系統事件日誌</h3>
        <div id="admin-logs" style="height: 150px; overflow-y: auto; background: var(--log-bg); padding: 10px; border: 1px solid var(--border); font-family: monospace; font-size: 0.9rem;"></div>
    </div>

    <script>
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const pathname = window.location.pathname;
        const basePath = pathname.substring(0, pathname.lastIndexOf('/'));
        const wsUrl = `${wsProtocol}//${window.location.host}${basePath}/ws`;
        let ws;

        function connect() {
            ws = new WebSocket(wsUrl);
            const statusEl = document.getElementById('connection-status');
            
            ws.onopen = () => {
                statusEl.textContent = "✅ 已連線至伺服器";
                statusEl.className = "connected";
                statusEl.style.display = "block";
                setTimeout(() => statusEl.style.display = "none", 2000);
            };

            ws.onclose = () => {
                statusEl.textContent = "❌ 連線中斷，嘗試重新連線...";
                statusEl.className = "";
                statusEl.style.display = "block";
                setTimeout(connect, 3000);
            };

            ws.onmessage = (event) => {
                const state = JSON.parse(event.data);
                updateDashboard(state);
            };
        }

        function updateDashboard(state) {
            // 階段翻譯
            const phaseMap = {
                "WAIT_R1": "第一輪：準備中", "R1_RUNNING": "第一輪：盲打佈局 (進行中)",
                "R1_EVAL": "第一輪：系統結算中", "WAIT_R2": "第二輪：準備中",
                "R2_RUNNING": "第二輪：熱戰進行中", "END": "戰鬥結束", "FINAL": "🏆 最終結算"
            };
            document.getElementById('phase-display').innerText = `🚨 階段：${phaseMap[state.phase] || state.phase}`;
            
            // 計時器
            const mins = String(Math.floor(state.time_remaining / 60)).padStart(2, '0');
            const secs = String(state.time_remaining % 60).padStart(2, '0');
            document.getElementById('timer-display').innerText = state.timer_running ? `⏱️ ${mins}:${secs}` : "⏳ 暫停/鎖定";

            // 分數
            document.getElementById('score-red').innerText = state.teams.red.score;
            document.getElementById('score-blue').innerText = state.teams.blue.score;

            // 如果輸入框沒有被選中 (focus)，才更新設定內容，避免打字到一半被覆蓋
            if (document.activeElement.id !== 'in-sysmsg') document.getElementById('in-sysmsg').value = state.base_system_msg;
            if (document.activeElement.id !== 'in-keywords') document.getElementById('in-keywords').value = state.keywords.join(', ');

            // 🌟 更新開關與模型選單的狀態
            document.getElementById('in-antispam').checked = state.anti_spam || false;
            document.getElementById('in-advscore').checked = state.adv_score || false;
            if (state.current_model) document.getElementById('in-model').value = state.current_model;

            // 日誌
            const logsHtml = state.event_logs.map(log => `<div>${log}</div>`).join('');
            document.getElementById('admin-logs').innerHTML = logsHtml;
        }

        // --- 發送指令到後端 ---
        function setPhase(phase, mins) {
            ws.send(JSON.stringify({ action: "admin_set_phase", phase: phase, mins: mins }));
        }

        function saveSettings() {
            ws.send(JSON.stringify({
                action: "admin_settings",
                base_system_msg: document.getElementById('in-sysmsg').value,
                keywords: document.getElementById('in-keywords').value,
                // 🌟 送出新設定
                anti_spam: document.getElementById('in-antispam').checked,
                adv_score: document.getElementById('in-advscore').checked,
                current_model: document.getElementById('in-model').value
            }));
        }

        function resetGame() {
            if(confirm("確定要重置整個遊戲嗎？分數與紀錄將被清空！")) {
                ws.send(JSON.stringify({ action: "admin_reset" }));
            }
        }

        function adjustTime(delta) {
            if(!confirm(`確定要 ${delta > 0 ? '增加' : '減少'} 1 分鐘嗎？`)) return;
            ws.send(JSON.stringify({ action: "admin_adjust_time", delta: delta }));
        }

        // 啟動連線
        connect();
        
        async function doLogout() {
            if (!confirm("確定要登出嗎？")) return;
            
            // 自動偵測 Base Path
            const pathname = window.location.pathname;
            const basePath = pathname.substring(0, pathname.lastIndexOf('/'));
            
            try {
                await fetch(`${basePath}/api/logout`, { method: 'POST' });
                window.location.href = `${basePath}/login`; // 登出後跳轉回登入大廳
            } catch (err) {
                alert("登出失敗，請檢查網路連線。");
            }
        }
    </script>
</body>
</html>
